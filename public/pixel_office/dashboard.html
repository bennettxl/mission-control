<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Office</title>
    <style>
        body {
            background-color: #333;
            color: #fff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .office-container {
            position: relative;
            width: 800px;
            height: 600px;
        }
        .background {
            width: 100%;
            height: 100%;
        }
        .agent {
            position: absolute;
            width: 100px; /* Adjust as needed */
            height: 100px; /* Adjust as needed */
        }
        #xl-agent {
            top: 400px;
            left: 250px;
        }
        #sub-agent-1 {
            top: 400px;
            left: 450px;
        }
    </style>
</head>
<body>
    <div class="office-container">
        <img src="/pixel_office/assets/background.png" alt="Office Background" class="background">
        <img id="xl-agent" src="/pixel_office/assets/empty_desk.png" alt="XL Agent" class="agent">
        <img id="sub-agent-1" src="/pixel_office/assets/empty_desk.png" alt="Sub Agent 1" class="agent">
    </div>

    <script>
        async function updateStatus() {
            try {
                const response = await fetch('/api/agent-status');
                const data = await response.json();

                const xlAgentImg = document.getElementById('xl-agent');
                const subAgent1Img = document.getElementById('sub-agent-1');

                xlAgentImg.src = data.xl_agent === 'active' ? '/pixel_office/assets/xl_agent.png' : '/pixel_office/assets/empty_desk.png';
                subAgent1Img.src = data.sub_agent_1 === 'active' ? '/pixel_office/assets/sub_agent.png' : '/pixel_office/assets/empty_desk.png';

            } catch (error) {
                console.error("Error fetching status:", error);
            }
        }

        // Initial update
        updateStatus();

        // Update every 5 seconds
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
